<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Candinho 🎨</title>

<style>
body {
  font-family: Arial;
  background: #f0f8ff;
  text-align: center;
}

#chat {
  max-width: 400px;
  margin: auto;
  background: white;
  height: 300px;
  overflow-y: auto;
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h2>🎨 Candinho</h2>

<img src="https://i.imgur.com/iWmEdZz.jpeg" width="100" style="border-radius:50%;" />

<div id="chat"></div>

<input id="msg" placeholder="Pergunte sobre arte..." />
<button onclick="enviar()">Enviar</button>

<script>
window.enviar = async function() {
  const input = document.getElementById("msg");
  const chat = document.getElementById("chat");

  const mensagem = input.value;
  if (!mensagem) return;

  chat.innerHTML += `<p>👦 ${mensagem}</p>`;

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ mensagem })
  });

  const data = await res.json();

  chat.innerHTML += `<p>🤖 ${data.resposta}</p>`;

  input.value = "";
};
</script>

</body>
</html>
