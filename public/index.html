<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Candinho 🎨</title>

<style>
body {
  font-family: Arial;
  background: #f0f8ff;
  text-align: center;
}

#chat {
  max-width: 400px;
  margin: auto;
  background: white;
  height: 400px;
  overflow-y: auto;
  padding: 10px;
  border-radius: 15px;
}

input, button {
  padding: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<h2>🎨 Candinho</h2>

<img src="https://i.imgur.com/iWmEdZz.jpeg" width="120" style="border-radius:50%;" />

<div id="chat"></div>

<input id="msg" placeholder="Pergunte sobre arte..." />
<br>
<button onclick="enviar()">Enviar</button>

<script>
// FUNÇÃO PRINCIPAL
async function enviar() {
  const input = document.getElementById("msg");
  const chat = document.getElementById("chat");

  const mensagem = input.value;
  if (!mensagem) return;

  chat.innerHTML += `<p>👦 ${mensagem}</p>`;

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ mensagem })
    });

    const data = await res.json();

    chat.innerHTML += `<p>🎨 ${data.resposta || "Sem resposta 😢"}</p>`;

  } catch (e) {
    chat.innerHTML += `<p style="color:red;">Erro 😢</p>`;
  }

  input.value = "";
}

// ENTER FUNCIONANDO
document.getElementById("msg").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    enviar();
  }
});
</script>

</body>
</html>
