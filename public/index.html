<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candinho - Especialista em Arte</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            color: white;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: #0f3460;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #e94560;
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #fff;
            padding: 5px;
            box-shadow: 0 0 0 3px #ffd700;
            overflow: hidden;
        }
        
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .title h1 {
            margin: 0;
            color: white;
            font-size: 28px;
        }
        
        .title p {
            margin: 5px 0 0;
            color: #ffe0e0;
        }
        
        .chat-area {
            background: #1a1a2e;
            border-radius: 15px;
            padding: 20px;
            height: 450px;
            overflow-y: auto;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }
        
        .mensagem {
            margin: 10px 0;
            padding: 12px 18px;
            border-radius: 18px;
            max-width: 85%;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.4;
        }
        
        .usuario {
            background: #e94560;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }
        
        .candinho {
            background: #533483;
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }
        
        .input-area {
            display: flex;
            gap: 12px;
        }
        
        input {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            font-family: inherit;
            background: #f0f0f0;
            color: #333;
        }
        
        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 25px;
            font-size: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #d63454;
        }
        
        .status {
            font-size: 12px;
            text-align: center;
            margin-top: 15px;
            color: #aaa;
        }

        .pensando {
            font-style: italic;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="avatar">
                <!-- Imagem do Candinho -->
                <img src="https://i.imgur.com/iWmEdZz.jpg" alt="Avatar do Candinho">
            </div>
            <div class="title">
                <h1>Candinho 🎨</h1>
                <p>Especialista em Arte e Cultura</p>
            </div>
        </div>
        
        <div class="chat-area" id="chat">
            <div class="mensagem candinho">
                E aí! Sou o Candinho. Vamos falar de arte? Posso te contar sobre quadros famosos, museus ou até te dar ideias para desenhar! 🖼️
            </div>
        </div>
        
        <div class="input-area">
            <input type="text" id="pergunta" placeholder="Pergunte algo sobre arte..." 
                   onkeypress="if(event.key === 'Enter') enviarMensagem()">
            <button onclick="enviarMensagem()">Enviar</button>
        </div>
        <div class="status">
            🔒 Seguro | Foco em Arte e Educação
        </div>
    </div>

    <script>
       async function enviarMensagem() {
    const input = document.getElementById('pergunta');
    const texto = input.value.trim();
    if (!texto) return;

    adicionarMensagem(texto, 'usuario');
    input.value = '';

    const chatDiv = document.getElementById('chat');
    const pensando = adicionarMensagem('Candinho está pensando...', 'candinho');

    try {
        const resposta = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ pergunta: texto })
        });

        const dados = await resposta.json();
        chatDiv.removeChild(pensando);

        if (dados.error) {
            // ISSO VAI MOSTRAR O ERRO REAL NA TELA
            adicionarMensagem("ERRO: " + dados.error, 'candinho');
        } else if (dados.candidates && dados.candidates[0].content) {
            adicionarMensagem(dados.candidates[0].content.parts[0].text, 'candinho');
        }
    } catch (erro) {
        chatDiv.removeChild(pensando);
        adicionarMensagem("Erro de rede. Verifique sua conexão.", 'candinho');
    }
}

        function adicionarMensagem(texto, classe) {
            const chatDiv = document.getElementById('chat');
            const msg = document.createElement('div');
            msg.className = `mensagem ${classe}`;
            msg.textContent = texto;
            chatDiv.appendChild(msg);
            
            // Rola o chat para o fim
            chatDiv.scrollTop = chatDiv.scrollHeight;
            return msg;
        }
    </script>
</body>
</html>
