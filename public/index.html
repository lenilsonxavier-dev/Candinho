<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Candinho 🎨</title>
  
<style>
body {
  font-family: Arial;
  background: #e6f2ff;
  text-align: center;
}

#chat {
  max-width: 600px;
  margin: auto;
  background: white;
  height: 450px;
  overflow-y: auto;
  padding: 20px;
  border-radius: 20px;
  font-size: 18px;
}

input {
  padding: 12px;
  width: 60%;
  font-size: 16px;
  border-radius: 10px;
}

button {
  padding: 12px;
  font-size: 16px;
  border-radius: 10px;
  background: #ffcc00;
  border: none;
  cursor: pointer;
}

.bot {
  color: blue;
  margin: 10px;
}

.user {
  color: green;
  margin: 10px;
}

h2 {
  font-size: 32px;
}
</style>
</head>

<body>

<h2>🎨 Candinho</h2>

<img src="https://i.imgur.com/iWmEdZz.jpeg" width="100" style="border-radius:50%;" />

<div id="chat"></div>

<input id="msg" placeholder="Pergunte sobre arte..." />
<button onclick="enviar()">Enviar</button>

<script>
window.enviar = async function() {
  const input = document.getElementById("msg");
  const chat = document.getElementById("chat");

  const mensagem = input.value;
  if (!mensagem) return;

  chat.innerHTML += `<p class="user">👦 <b>Você:</b> ${mensagem}</p>`;
  input.value = "";
  chat.scrollTop = chat.scrollHeight;

  // Adiciona indicador de "digitando"
  chat.innerHTML += `<p class="bot" id="loading">🤖 <b>Candinho:</b> ✍️ Digitando...</p>`;
  chat.scrollTop = chat.scrollHeight;

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ mensagem })
    });

    // Remove o indicador de loading
    document.getElementById("loading")?.remove();

    if (!res.ok) {
      throw new Error(`HTTP ${res.status}`);
    }

    const data = await res.json();
    chat.innerHTML += `<p class="bot">🤖 <b>Candinho:</b> ${data.resposta}</p>`;
    
  } catch (err) {
    document.getElementById("loading")?.remove();
    chat.innerHTML += `<p style="color:red;">⚠️ Erro: ${err.message}. Tente recarregar a página.</p>`;
    console.error("Erro detalhado:", err);
  }
  
  chat.scrollTop = chat.scrollHeight;
};
</script>
  </body>
</html>
